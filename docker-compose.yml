services:
  mini-swe-slack:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PUID: ${PUID:-1000}
        PGID: ${PGID:-1000}
    container_name: mini-swe-slack
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REPO_CONFIG_PATH: /app/repos.json
      WORKTREE_ROOT: /worktrees
      WEB_UI_BIND: 0.0.0.0
      WEB_UI_PORT: 8787
      GH_TOKEN: ${GH_TOKEN:-}
      GITHUB_TOKEN: ${GH_TOKEN:-}
      GIT_SSH_COMMAND: ssh -i /home/appuser/.ssh/id_ed25519_mini_swe -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=/home/appuser/.ssh/known_hosts
    ports:
      - "8787:8787"
    volumes:
      - ./repos.json:/app/repos.json:ro
      - /srv/agent/repos:/repos
      - /srv/agent/worktrees:/worktrees
      - /home/raytail/.ssh:/home/appuser/.ssh:ro
